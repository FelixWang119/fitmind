[pytest]
testpaths = tests
python_files = test_*.py
python_classes = Test*
python_functions = test_*
addopts = -v --tb=short --disable-warnings
markers =
    slow: marks tests as slow (deselect with '-m "not slow"')
    integration: integration tests
    unit: unit tests
    e2e: end-to-end tests
    database: tests that require database
    api: tests that hit API endpoints
    p0: Priority 0 - Critical (core functionality, must pass)
    p1: Priority 1 - High (important features)
    p2: Priority 2 - Medium (general features, performance tests)
    p3: Priority 3 - Low (edge cases, nice to have)