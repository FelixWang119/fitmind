# BMM Module Configuration
# Generated by BMAD installer
# Version: 6.0.1
# Date: 2026-02-20T23:40:18.912Z

project_name: bmad
user_skill_level: intermediate
planning_artifacts: "{project-root}/_bmad_out/planning-artifacts"
implementation_artifacts: "{project-root}/_bmad_out/implementation-artifacts"
project_knowledge: "{project-root}/docs"

# Core Configuration Values
user_name: Felix
communication_language: Chinese
document_output_language: Chinese
output_folder: "{project-root}/_bmad_out"

# 用户记忆系统配置
memory:
  # 记忆保留策略
  retention:
    # 短期记忆保留天数
    short_term_days: 7
    # 长期记忆保留天数（0表示永久）
    long_term_days: 0
    # 索引触发方式: daily / realtime
    index_trigger: "daily"
    # 定时索引时间（24小时制）
    index_time: "03:00"
  
  # Embedding 配置
  embedding:
    # 提供商: local / cloud
    provider: "local"
    # 本地模型配置
    local:
      # 模型路径
      model_path: "./models/bge-small-zh-v1.5"
      # 设备: cpu / cuda
      device: "cpu"
      # 批处理大小
      batch_size: 32
    # 云端模型配置（预留）
    cloud:
      api_key: "${EMBEDDING_API_KEY}"
      endpoint: "https://api.xxx.com/embedding"
      model: "embedding-v1"
  
  # 搜索配置
  search:
    # 默认返回数量
    default_limit: 10
    # 最大返回数量
    max_limit: 100
