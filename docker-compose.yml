version: '3.8'

services:
  postgres:
    image: postgres:15-alpine
    container_name: weight_ai_postgres
    environment:
      POSTGRES_DB: weight_ai_db
      POSTGRES_USER: weight_ai_user
      POSTGRES_PASSWORD: weight_ai_password
    ports:
      - "5432:5432"
    volumes:
      - postgres_data:/var/lib/postgresql/data
      - ./init-db:/docker-entrypoint-initdb.d
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U weight_ai_user -d weight_ai_db"]
      interval: 10s
      timeout: 5s
      retries: 5
    networks:
      - weight_ai_network
    deploy:
      resources:
        limits:
          memory: 512M
          cpus: '0.5'

  backend:
    build:
      context: ./backend
      dockerfile: Dockerfile
      target: development
    container_name: weight_ai_backend
    environment:
      - DATABASE_URL=postgresql://weight_ai_user:weight_ai_password@postgres:5432/weight_ai_db
      - QWEN_API_KEY=${QWEN_API_KEY:-mock_key_for_development}
      - ENVIRONMENT=development
      - SECRET_KEY=${SECRET_KEY:-dev_secret_key_change_in_production}
      - PYTHONUNBUFFERED=1
      - PYTHONPATH=/app
      - DEBUG=1
    ports:
      - "8000:8000"
    volumes:
      - ./backend:/app
      - backend_python_cache:/root/.cache/pip
    depends_on:
      postgres:
        condition: service_healthy
    networks:
      - weight_ai_network
    healthcheck:
      test: ["CMD", "curl", "-f", "http://localhost:8000/health"]
      interval: 30s
      timeout: 10s
      retries: 3
    command: uvicorn main:app --host 0.0.0.0 --port 8000 --reload
    deploy:
      resources:
        limits:
          memory: 512M
          cpus: '0.5'

  frontend:
    build:
      context: ./frontend
      dockerfile: Dockerfile
      target: development
    container_name: weight_ai_frontend
    environment:
      - VITE_API_URL=http://localhost:8000
      - VITE_ENVIRONMENT=development
      - CHOKIDAR_USEPOLLING=true
      - WATCHPACK_POLLING=true
    ports:
      - "3000:3000"
    volumes:
      - ./frontend:/app
      - /app/node_modules
      - frontend_node_modules:/app/node_modules
    depends_on:
      - backend
    networks:
      - weight_ai_network
    healthcheck:
      test: ["CMD", "curl", "-f", "http://localhost:3000"]
      interval: 30s
      timeout: 10s
      retries: 3
    command: npm run dev -- --host 0.0.0.0
    deploy:
      resources:
        limits:
          memory: 512M
          cpus: '0.5'

  # Development tools
  pgadmin:
    image: dpage/pgadmin4:latest
    container_name: weight_ai_pgadmin
    environment:
      - PGADMIN_DEFAULT_EMAIL=admin@weightai.com
      - PGADMIN_DEFAULT_PASSWORD=admin123
    ports:
      - "5050:80"
    depends_on:
      - postgres
    networks:
      - weight_ai_network
    deploy:
      resources:
        limits:
          memory: 256M
          cpus: '0.2'

volumes:
  postgres_data:
  backend_python_cache:
  frontend_node_modules:

networks:
  weight_ai_network:
    driver: bridge