version: '3.8'

services:
  backend:
    build:
      target: development
    environment:
      - DEBUG=1
      - RELOAD=1
    volumes:
      - ./backend:/app
      - backend_python_cache:/root/.cache/pip
    command: uvicorn main:app --host 0.0.0.0 --port 8000 --reload

  frontend:
    build:
      target: development
    environment:
      - CHOKIDAR_USEPOLLING=true
      - WATCHPACK_POLLING=true
    volumes:
      - ./frontend:/app
      - frontend_node_modules:/app/node_modules
    command: npm run dev -- --host 0.0.0.0

  # Development-only services
  redis:
    image: redis:7-alpine
    container_name: weight_ai_redis
    ports:
      - "6379:6379"
    networks:
      - weight_ai_network
    deploy:
      resources:
        limits:
          memory: 128M
          cpus: '0.1'

volumes:
  backend_python_cache:
  frontend_node_modules: